name: Release 🏗️

# Manual-only, and not yet run: this package has never been published. Omni's
# services consume it as a git dependency pinning a commit (which is why build/
# is committed), so a release is not needed to ship them a change; publishing
# would only serve installers outside Omni.
#
# Before the first release, settle the `_todo` in package.json questioning the
# package name. Publishing claims a name on the registry permanently, so it is
# worth renaming beforehand rather than deprecating afterwards.
#
# NPM_TOKEN is a repository secret, mirroring the Bitwarden item "NPM Omni
# Changesets publish token". It EXPIRES 2026-10-11, and npm is phasing out
# tokens that bypass 2FA (which this one does), so an auth failure here most
# likely means the token lapsed rather than anything wrong with the package.
# Configuring npm trusted publishing (OIDC) retires the token entirely and is
# the durable fix; the id-token permission below is what OIDC needs.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Handle release 🦋
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # registry-url is what writes the .npmrc that reads NODE_AUTH_TOKEN below;
      # without it the publish reaches npm unauthenticated and fails ENEEDAUTH
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Create release PR or publish package
        uses: changesets/action@v1
        with:
          publish: bun release
          title: "feature(release): version packages"
          commit: "ci(changesets): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
